name: Backend CI

on:
  # Run this workflow when code is pushed to main.
  push:
    branches: [main]

  # Run this workflow when a pull request targets main.
  pull_request:
    branches: [main]

jobs:
  build-backend:
    # Use GitHub's hosted Ubuntu runner for this job.
    runs-on: ubuntu-latest

    steps:
      # Download the repository code into the runner.
      - name: Checkout repository
        uses: actions/checkout@v4

      # Install the Python version used by the backend.
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      # Install backend dependencies from requirements.txt.
      - name: Install backend dependencies
        run: pip install -r backend/requirements.txt

      # Verify the backend Python files compile without syntax/import issues.
      - name: Compile backend Python files
        run: python -m py_compile backend/main.py backend/database.py
