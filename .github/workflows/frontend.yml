name: Frontend CI

on:
  # Run this workflow when code is pushed to main.
  push:
    branches: [main]

  # Run this workflow when a pull request targets main.
  pull_request:
    branches: [main]

jobs:
  build-frontend:
    # Use GitHub's hosted Ubuntu runner for this job.
    runs-on: ubuntu-latest

    defaults:
      run:
        # Run all shell commands in the frontend folder by default.
        working-directory: frontend

    steps:
      # Download the repository code into the runner.
      - name: Checkout repository
        uses: actions/checkout@v4

      # Install the Node.js version used for the frontend build.
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      # Install frontend dependencies exactly as locked in package-lock.json.
      - name: Install frontend dependencies
        run: npm ci

      # Make sure the Vite frontend builds successfully.
      - name: Build frontend
        run: npm run build
